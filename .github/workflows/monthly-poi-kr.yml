name: Monthly All the Places KR build

on:
  schedule:
    - cron: "0 18 1 * *"
  workflow_dispatch:
    inputs:
      spiders:
        description: "Comma-separated allowlisted spiders to refresh; blank runs the full allowlist"
        required: false
        default: ""

permissions:
  contents: read
  actions: read
  pages: write
  id-token: write

concurrency:
  group: alltheplaces-kr-monthly
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      BUNDLE_GEMFILE: ${{ github.workspace }}/portal/Gemfile
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: upstream/alltheplaces/uv.lock
      - name: Install pinned ATP dependencies
        run: uv sync --project upstream/alltheplaces --all-groups --locked
      - name: Validate Korea overlay
        env:
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/upstream/alltheplaces
        run: |
          uv run --project upstream/alltheplaces python -m pytest tests
          uv run --project upstream/alltheplaces python scripts/alltheplaces_kr_run_monthly.py --list-only
          uv run --project upstream/alltheplaces python scripts/alltheplaces_kr_discover_spiders.py --unreviewed-only
      - name: Restore baseline for a partial spider refresh
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.spiders != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          previous_run=$(gh run list --workflow monthly-poi-kr.yml --status success --limit 1 --json databaseId --jq '.[0].databaseId')
          test -n "$previous_run"
          mkdir -p dist/latest
          gh run download "$previous_run" --name monthly-dist --dir dist/latest
      - name: Crawl Korea allowlist and assemble dist
        env:
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/upstream/alltheplaces
          REFRESH_SPIDERS: ${{ inputs.spiders }}
        run: |
          if [ -z "$REFRESH_SPIDERS" ]; then
            uv run --project upstream/alltheplaces python scripts/alltheplaces_kr_run_monthly.py
          else
            args=()
            IFS=',' read -ra requested <<< "$REFRESH_SPIDERS"
            for spider in "${requested[@]}"; do
              spider="${spider//[[:space:]]/}"
              test -n "$spider"
              args+=(--spider "$spider")
            done
            uv run --project upstream/alltheplaces python scripts/alltheplaces_kr_run_monthly.py \
              "${args[@]}" --baseline dist/latest/pois.geojson
          fi
      - name: Validate monthly bundle
        env:
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/upstream/alltheplaces
        run: uv run --project upstream/alltheplaces python scripts/alltheplaces_kr_build_latest.py --validate-only
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - run: pnpm --dir web install --frozen-lockfile
      - run: pnpm --dir web build
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
      - name: Build Jekyll data portal
        run: |
          cp web/public/data/latest/metadata.json portal/_data/alltheplaces/runtime.json
          bundle exec jekyll build --source portal --destination portal/_site
      - name: Add interactive map to portal
        run: |
          mkdir -p portal/_site/map
          cp -R web/dist/. portal/_site/map/
      - uses: actions/upload-artifact@v4
        with:
          name: monthly-dist
          path: dist/latest
          retention-days: 90
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: portal/_site
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
