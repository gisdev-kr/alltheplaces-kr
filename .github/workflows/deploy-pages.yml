name: Deploy portal UI

on:
  push:
    branches: [main]
    paths: ["web/**", "portal/**", ".github/workflows/deploy-pages.yml"]
  pull_request:
    paths: ["web/**", "portal/**", ".github/workflows/deploy-pages.yml"]
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  pages: write
  id-token: write

concurrency:
  group: alltheplaces-kr-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      BUNDLE_GEMFILE: ${{ github.workspace }}/portal/Gemfile
    steps:
      - uses: actions/checkout@v4
      - name: Restore newest monthly data when available
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          run_id=$(gh run list --workflow monthly-poi-kr.yml --status success --limit 1 --json databaseId --jq '.[0].databaseId')
          if [ -n "$run_id" ]; then
            rm -rf web/public/data/latest
            mkdir -p web/public/data/latest
            gh run download "$run_id" --name monthly-dist --dir web/public/data/latest
          fi
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - run: pnpm --dir web install --frozen-lockfile
      - run: pnpm --dir web build
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
      - name: Build Jekyll data portal
        run: |
          cp web/public/data/latest/metadata.json portal/_data/alltheplaces/runtime.json
          bundle exec jekyll build --source portal --destination portal/_site
      - name: Add interactive map to portal
        run: |
          mkdir -p portal/_site/map
          cp -R web/dist/. portal/_site/map/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: portal/_site
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
