name: Propose ATP upstream update

on:
  schedule:
    - cron: "15 17 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Move the pinned submodule to upstream master
        run: git submodule update --remote upstream/alltheplaces
      - name: Open review pull request when ATP changed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if git diff --quiet -- upstream/alltheplaces; then
            echo "Already current."
            exit 0
          fi
          branch="automation/atp-upstream-$(date +%Y%m%d)"
          git switch -c "$branch"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add upstream/alltheplaces
          git commit -m "chore: update pinned All the Places upstream"
          git push origin "$branch"
          gh pr create --title "chore: update pinned All the Places upstream" --body "Automated submodule pointer update. Review upstream changes and Korea spider checks before merging." --base main --head "$branch"

