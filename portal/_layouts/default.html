<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#ffffff">
    {% seo %}
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  </head>
  <body class="{{ page.body_class | default: 'portal-body' }}">
    <a class="skip-link" href="#main-content">본문으로 이동</a>
    {% include portal-header.html %}
    <main id="main-content">{{ content }}</main>
    {% include portal-footer.html %}
    {% assign counter_path = page.url | relative_url %}
    <script data-goatcounter="https://{{ site.goatcounter_code }}.goatcounter.com/count" data-goatcounter-settings='{"path":"{{ counter_path }}"}' async src="https://gc.zgo.at/count.js"></script>
    <script src="{{ '/assets/js/portal.js' | relative_url }}" defer></script>
  </body>
</html>
